<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нафталин FM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0c0a;
    --surface: #141210;
    --surface2: #1a1714;
    --border: #2a2520;
    --accent: #f5c842;
    --accent2: #e05a2b;
    --text: #f0ede8;
    --muted: #5a5248;
    --mono: 'IBM Plex Mono', monospace;
    --display: 'Bebas Neue', cursive;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
  }

  .glow {
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.05;
    pointer-events: none;
    animation: drift 10s ease-in-out infinite alternate;
  }
  .glow-1 { background: var(--accent); top: -150px; left: -150px; }
  .glow-2 { background: var(--accent2); bottom: -150px; right: -150px; animation-delay: -5s; }
  @keyframes drift {
    from { transform: translate(0,0); }
    to   { transform: translate(50px, 40px); }
  }

  .shell {
    width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
    position: relative;
    z-index: 1;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(24px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 9px; letter-spacing: 0.18em; color: var(--muted);
  }
  .live-pill {
    display: flex; align-items: center; gap: 5px;
    font-size: 9px; letter-spacing: 0.18em;
    color: var(--muted);
    transition: color 0.3s;
  }
  .live-pill.on { color: var(--accent2); }
  .live-pill::before {
    content: ''; width: 5px; height: 5px; border-radius: 50%;
    background: currentColor;
  }
  .live-pill.on::before { animation: blink 1.1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .station-head {
    padding: 24px 24px 18px;
    border-bottom: 1px solid var(--border);
  }
  .station-eyebrow {
    font-size: 9px; letter-spacing: 0.22em; color: var(--muted); margin-bottom: 4px;
  }
  .station-title {
    font-family: var(--display);
    font-size: 46px; line-height: 1; letter-spacing: 0.01em;
    color: var(--text);
  }
  .station-title .hi { color: var(--accent); }
  .station-sub {
    font-size: 10px; color: var(--muted); margin-top: 7px; letter-spacing: 0.1em;
  }

  .viz-wrap {
    height: 56px; padding: 0 24px;
    display: flex; align-items: center;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }
  .bars { display: flex; align-items: center; gap: 2px; width: 100%; height: 36px; }
  .bar {
    flex: 1; background: var(--accent); border-radius: 1px;
    height: 3px; opacity: 0.5;
    transform-origin: center;
    transition: height 0.4s ease;
    animation: ba var(--d,0.8s) ease-in-out infinite alternate;
    animation-play-state: paused;
  }
  .bars.playing .bar { animation-play-state: running; height: var(--h, 8px); opacity: 0.75; }
  @keyframes ba { from{transform:scaleY(0.2)} to{transform:scaleY(1)} }

  .controls {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
  }
  .play-btn {
    width: 52px; height: 52px; flex-shrink: 0;
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s, transform 0.1s;
  }
  .play-btn:hover { background: var(--accent); color: #000; }
  .play-btn:active { transform: scale(0.93); }
  .play-btn svg { width: 18px; height: 18px; }

  .info { flex: 1; min-width: 0; }
  .info-label { font-size: 9px; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 3px; }
  .info-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .info-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .vol-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 24px 14px;
    border-bottom: 1px solid var(--border);
  }
  .vol-icon { color: var(--muted); flex-shrink: 0; }
  .vol-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 2px; background: var(--border); outline: none; cursor: pointer;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 11px; height: 11px;
    background: var(--accent); border-radius: 0;
  }
  .vol-slider::-moz-range-thumb {
    width: 11px; height: 11px; background: var(--accent); border-radius: 0; border: none;
  }
  .vol-val { font-size: 10px; color: var(--muted); width: 30px; text-align: right; }

  .stations-section { border-bottom: 1px solid var(--border); }
  .stations-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 24px;
    font-size: 9px; letter-spacing: 0.2em; color: var(--muted);
    cursor: pointer; user-select: none;
    transition: color 0.15s;
  }
  .stations-header:hover { color: var(--text); }
  .stations-header svg { transition: transform 0.25s; }
  .stations-header.open svg { transform: rotate(180deg); }

  .stations-list {
    max-height: 0; overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .stations-list.open { max-height: 280px; overflow-y: auto; }
  .stations-list::-webkit-scrollbar { width: 4px; }
  .stations-list::-webkit-scrollbar-thumb { background: var(--border); }

  .station-item {
    display: flex; align-items: center;
    padding: 8px 24px;
    cursor: pointer; font-size: 11px;
    border-top: 1px solid var(--border);
    transition: background 0.12s; gap: 10px;
  }
  .station-item:hover { background: var(--surface2); }
  .station-item.active { color: var(--accent); }
  .station-item .s-arrow { width: 10px; flex-shrink: 0; font-size: 8px; }
  .station-item-sub { font-size: 9px; color: var(--muted); margin-left: auto; }

  .url-section { padding: 12px 24px 14px; border-bottom: 1px solid var(--border); }
  .url-label { font-size: 9px; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 6px; }
  .url-row { display: flex; gap: 6px; }
  .url-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: var(--mono); font-size: 9px;
    padding: 6px 9px; outline: none; min-width: 0;
    transition: border-color 0.15s;
  }
  .url-input:focus { border-color: var(--accent); }
  .url-apply {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.1em; padding: 6px 10px; cursor: pointer; flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
  }
  .url-apply:hover { border-color: var(--accent); color: var(--accent); }
  .err-msg { font-size: 9px; color: var(--accent2); margin-top: 5px; min-height: 12px; }

  .footer {
    display: flex; justify-content: space-between;
    padding: 9px 24px;
    font-size: 9px; letter-spacing: 0.12em; color: var(--muted);
  }

  .spinner {
    width: 18px; height: 18px;
    border: 1.5px solid currentColor; border-top-color: transparent;
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="shell">

  <div class="top-bar">
    <span>INTERNET RADIO</span>
    <span class="live-pill" id="livePill">OFFLINE</span>
    <span id="clock">--:--:--</span>
  </div>

  <div class="station-head">
    <div class="station-eyebrow">СТАНЦИЯ</div>
    <div class="station-title" id="stationTitle"><span class="hi">Нафталин</span> FM</div>
    <div class="station-sub" id="stationSub">Radio Record · AAC 96 kbps · Советская эстрада</div>
  </div>

  <div class="viz-wrap">
    <div class="bars" id="bars"></div>
  </div>

  <div class="controls">
    <button class="play-btn" id="playBtn">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>
    </button>
    <div class="info">
      <div class="info-label">В ЭФИРЕ</div>
      <div class="info-title" id="infoTitle">Нажмите ▶ для воспроизведения</div>
      <div class="info-sub" id="infoSub">—</div>
    </div>
  </div>

  <div class="vol-row">
    <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
    <input type="range" class="vol-slider" id="vol" min="0" max="100" value="80">
    <span class="vol-val" id="volVal">80%</span>
  </div>

  <div class="stations-section">
    <div class="stations-header" id="stationsToggle">
      <span>ДРУГИЕ КАНАЛЫ RADIO RECORD</span>
      <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><polygon points="5,7 1,3 9,3"/></svg>
    </div>
    <div class="stations-list" id="stationsList"></div>
  </div>

  <div class="url-section">
    <div class="url-label">STREAM URL</div>
    <div class="url-row">
      <input class="url-input" type="text" id="urlInput" placeholder="https://...">
      <button class="url-apply" id="urlApply">OK</button>
    </div>
    <div class="err-msg" id="errMsg"></div>
  </div>

  <div class="footer">
    <span id="footerLeft">НАФТАЛИН FM</span>
    <span>AAC / 96k</span>
  </div>

</div>

<audio id="audio" preload="none"></audio>

<script>
const STATIONS = [
  { name: 'Нафталин FM',        sub: 'Советская эстрада',       url: 'https://radiorecord.hostingradio.ru/naft96.aacp' },
  { name: 'Radio Record',       sub: 'Главный канал',            url: 'https://radiorecord.hostingradio.ru/rr_main96.aacp' },
  { name: 'Супердискотека 90-х',sub: '90-е',                    url: 'https://radiorecord.hostingradio.ru/sd9096.aacp' },
  { name: 'Record 80-х',        sub: '80-е',                    url: 'https://radiorecord.hostingradio.ru/198096.aacp' },
  { name: 'Eurodance',          sub: 'Еврoданс',                url: 'https://radiorecord.hostingradio.ru/eurodance96.aacp' },
  { name: 'Медляк FM',          sub: 'Медленные хиты',          url: 'https://radiorecord.hostingradio.ru/mdl96.aacp' },
  { name: 'Russian Mix',        sub: 'Русская поп-музыка',      url: 'https://radiorecord.hostingradio.ru/rus96.aacp' },
  { name: 'Russian Gold',       sub: 'Золотые хиты',            url: 'https://radiorecord.hostingradio.ru/russiangold96.aacp' },
  { name: 'Руки Вверх!',        sub: 'Руки Вверх FM',           url: 'https://radiorecord.hostingradio.ru/rv96.aacp' },
  { name: 'Synthwave',          sub: 'Синтвейв',                url: 'https://radiorecord.hostingradio.ru/synth96.aacp' },
  { name: 'Chill-Out',          sub: 'Атмосферный',             url: 'https://radiorecord.hostingradio.ru/chil96.aacp' },
  { name: 'Deep',               sub: 'Deep House',              url: 'https://radiorecord.hostingradio.ru/deep96.aacp' },
  { name: 'Rock',               sub: 'Рок',                     url: 'https://radiorecord.hostingradio.ru/rock96.aacp' },
  { name: 'Симфония FM',        sub: 'Классическая музыка',     url: 'https://radiorecord.hostingradio.ru/symph96.aacp' },
  { name: 'Веснушка FM',        sub: 'Детское радио',           url: 'https://radiorecord.hostingradio.ru/deti96.aacp' },
];

let currentIdx = 0;
let playing = false;
let loading = false;

const audio          = document.getElementById('audio');
const playBtn        = document.getElementById('playBtn');
const barsWrap       = document.getElementById('bars');
const infoTitle      = document.getElementById('infoTitle');
const infoSub        = document.getElementById('infoSub');
const livePill       = document.getElementById('livePill');
const volSlider      = document.getElementById('vol');
const volVal         = document.getElementById('volVal');
const urlInput       = document.getElementById('urlInput');
const urlApply       = document.getElementById('urlApply');
const errMsg         = document.getElementById('errMsg');
const clockEl        = document.getElementById('clock');
const stationSub     = document.getElementById('stationSub');
const stationTitle   = document.getElementById('stationTitle');
const stationsList   = document.getElementById('stationsList');
const stationsToggle = document.getElementById('stationsToggle');
const footerLeft     = document.getElementById('footerLeft');

// Clock
setInterval(() => { clockEl.textContent = new Date().toLocaleTimeString('ru-RU'); }, 1000);
clockEl.textContent = new Date().toLocaleTimeString('ru-RU');

// Bars
for (let i = 0; i < 52; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  b.style.setProperty('--h', (4 + Math.random() * 32) + 'px');
  b.style.setProperty('--d', (0.35 + Math.random() * 0.75) + 's');
  b.style.animationDelay = (-Math.random() * 1.2) + 's';
  barsWrap.appendChild(b);
}

// Station list
function buildList() {
  stationsList.innerHTML = '';
  STATIONS.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'station-item' + (i === currentIdx ? ' active' : '');
    el.innerHTML = `<span class="s-arrow">${i === currentIdx ? '▶' : ''}</span><span>${s.name}</span><span class="station-item-sub">${s.sub}</span>`;
    el.addEventListener('click', () => {
      const was = playing || loading;
      selectStation(i);
      if (was) { setTimeout(startStream, 100); }
    });
    stationsList.appendChild(el);
  });
}

function selectStation(i) {
  if (playing || loading) stopStream();
  currentIdx = i;
  const s = STATIONS[i];
  urlInput.value = s.url;
  stationTitle.innerHTML = `<span class="hi">${s.name.split(' ')[0]}</span> ${s.name.split(' ').slice(1).join(' ')}`;
  stationSub.textContent = `Radio Record · AAC 96 kbps · ${s.sub}`;
  footerLeft.textContent = s.name.toUpperCase();
  infoTitle.textContent = 'Нажмите ▶ для воспроизведения';
  infoSub.textContent = '—';
  errMsg.textContent = '';
  buildList();
}

stationsToggle.addEventListener('click', () => {
  stationsToggle.classList.toggle('open');
  stationsList.classList.toggle('open');
});

buildList();
urlInput.value = STATIONS[0].url;

// Volume
audio.volume = 0.8;
volSlider.addEventListener('input', () => {
  audio.volume = volSlider.value / 100;
  volVal.textContent = volSlider.value + '%';
});

// Icons
function setIcon(state) {
  if (state === 'loading') {
    playBtn.innerHTML = '<div class="spinner"></div>';
  } else if (state === 'stop') {
    playBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
  } else {
    playBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>';
  }
}

function setLive(on) {
  livePill.textContent = on ? 'LIVE' : 'OFFLINE';
  livePill.classList.toggle('on', on);
}

function startStream() {
  errMsg.textContent = '';
  const url = urlInput.value.trim();
  if (!url) { errMsg.textContent = '⚠ Введите URL'; return; }

  const found = STATIONS.findIndex(s => s.url === url);
  if (found >= 0 && found !== currentIdx) { currentIdx = found; buildList(); }

  loading = true;
  setIcon('loading');
  infoTitle.textContent = 'Подключение…';
  infoSub.textContent = 'Буферизация';
  setLive(false);

  audio.src = url;
  audio.load();
  audio.play().catch(() => handleError());
}

function stopStream() {
  audio.pause();
  audio.src = '';
  playing = false; loading = false;
  setIcon('play');
  barsWrap.classList.remove('playing');
  setLive(false);
  infoTitle.textContent = 'Остановлено';
  infoSub.textContent = '—';
}

function handleError() {
  loading = false; playing = false;
  setIcon('play');
  barsWrap.classList.remove('playing');
  setLive(false);
  infoTitle.textContent = 'Ошибка подключения';
  infoSub.textContent = '—';
  errMsg.textContent = '⚠ Не удалось воспроизвести поток';
}

audio.addEventListener('playing', () => {
  playing = true; loading = false;
  setIcon('stop');
  barsWrap.classList.add('playing');
  setLive(true);
  const s = STATIONS[currentIdx];
  infoTitle.textContent = (s ? s.name : 'Радио') + ' — Прямой эфир';
  infoSub.textContent   = s ? `Radio Record · ${s.sub}` : 'Подключено';
  errMsg.textContent = '';
});
audio.addEventListener('waiting', () => { infoSub.textContent = 'Буферизация…'; barsWrap.classList.remove('playing'); });
audio.addEventListener('canplay', () => { if (playing) barsWrap.classList.add('playing'); });
audio.addEventListener('error',   () => handleError());
audio.addEventListener('stalled', () => { if (playing) infoSub.textContent = 'Соединение нестабильно…'; });

playBtn.addEventListener('click', () => {
  if (loading) return;
  playing ? stopStream() : startStream();
});

urlApply.addEventListener('click', () => {
  const was = playing || loading;
  stopStream();
  errMsg.textContent = '';
  if (was) setTimeout(startStream, 100);
  else startStream();
});

urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') urlApply.click(); });
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target === document.body) { e.preventDefault(); playBtn.click(); }
});
</script>
</body>
</html>
